# This is a basic workflow to help you get started with Actions

name: daily plr
run-name: daily plr - ${{ github.event.head_commit.message }}

on: 
   push:
   pull_request: 
   workflow_dispatch:
   schedule:
    # * is a special character in YAML so you have to quote this string
      - cron:  '30 1 * * *'
jobs:

  master:
    runs-on: ubuntu-latest
    steps:
      - name: Echo site details
        run: echo building - master
 
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: checkout postgres
        run: |
          sudo apt-get update -qq
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys E298A3A825C0D65DFD57CBB651716619E084DAB9
          sudo add-apt-repository "deb https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/"
          sudo apt-get install -qq r-base-dev acl bison flex libssl-dev
          sudo R --version
          sudo /etc/init.d/postgresql stop
          sudo apt-get remove --purge postgresql\*
          sudo rm -rf /etc/postgresql /var/lib/postgresql
          git clone https://github.com/postgres/postgres.git
          pushd postgres
          git checkout master
          ./configure
          make -j4
          sudo make install
          export PATH=/usr/local/pgsql/bin:$PATH
          initdb -D data
          pg_ctl -D data -l logfile start
          psql -d postgres -c "SELECT version();"
          psql -d postgres -c "SELECT current_setting('server_version_num');"
          popd

      - name: Script
        run: |
          export USE_PGXS=1
          export PATH=/usr/local/pgsql/bin:$PATH
          SHLIB_LINK=-lgcov PG_CPPFLAGS="-fprofile-arcs -ftest-coverage -O0" make
          # USE_PGXS=1 is not required in Travis, and it is required in Github Actions
          sudo USE_PGXS=1 PATH=/usr/local/pgsql/bin:$PATH make install
          make installcheck || (cat regression.diffs && false)
        env:
          USE_PGXS: 1

  REL_19_:
    # SEEN JUN 2026
    # Ubuntu 24.04 - ubuntu-latest or ubuntu-24.04
    # https://github.com/actions/runner-images
    # noble (24.04, LTS), plucky (25.04, amd64 only)
    # https://wiki.postgresql.org/wiki/Apt
    # https://apt.postgresql.org/pub/repos/apt/dists/
    # ##
    # https://ftp.postgresql.org/pub/repos/apt/dists/noble-pgdg/
    # Regular expression search - "Package: postgresql-18$"
    # https://ftp.postgresql.org/pub/repos/apt/dists/noble-pgdg/main/binary-amd64/Packages
    runs-on: ubuntu-latest
    steps:
      - name: Echo site details
        run: echo building master
 
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: checkout postgres
        run: |
          set -x -v -e
          sudo apt-get update -qq
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys E298A3A825C0D65DFD57CBB651716619E084DAB9
          sudo add-apt-repository "deb https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/"
          sudo apt-get install -qq r-base-dev acl bison flex libssl-dev
          sudo R --version
          sudo /etc/init.d/postgresql stop
          sudo apt-get remove --purge postgresql\*
          sudo rm -rf /etc/postgresql /var/lib/postgresql
          export RET=$(git ls-remote --tags https://github.com/postgres/postgres.git | cut -c 52- | grep -c 'REL_19_[0-9]')
          if [ "${RET}" -gt "0" ]
          then
            export GITTAG=$(git ls-remote --tags https://github.com/postgres/postgres.git | cut -c 52- | grep -e 'REL_19_[0-9]' | tail -n 1)
            echo -n "Release(s) are found.  Taking the last Release . . . GITTAG: ${GITTAG}"
          else
            export RET=$(git ls-remote --tags https://github.com/postgres/postgres.git | cut -c 52- | grep -c 'REL_19_RC[0-9]')
            echo "Release(s) are not found.  Trying Release Candidates."
            if [ "${RET}" -gt "0" ]
            then
              export GITTAG=$(git ls-remote --tags https://github.com/postgres/postgres.git | cut -c 52- | grep -e 'REL_19_RC[0-9]' | tail -n 1)
              echo -n "Release Candidate(s) are found.  Taking the last Release Candidate . . . GITTAG: ${GITTAG}"
            else
              export RET=$(git ls-remote --tags https://github.com/postgres/postgres.git | cut -c 52- | grep -c 'REL_19_BETA[0-9]')
              echo "Release Candidate(s) are not found. Trying Betas."
              if [ "${RET}" -gt "0" ]
              then
                export GITTAG=$(git ls-remote --tags https://github.com/postgres/postgres.git | cut -c 52- | grep -e 'REL_19_BETA[0-9]' | tail -n 1)
                echo -n "Beta(s) are found. Taking the last Beta . . . GITTAG: ${GITTAG}"
              else
                echo "Beta(s) are not found."
              fi
            fi
          fi
          echo "GITTAG: ${GITTAG}"
          git clone --branch $GITTAG --depth=1 https://github.com/postgres/postgres.git
          pushd postgres
          ./configure
          make
          sudo make install
          export PATH=/usr/local/pgsql/bin:$PATH
          initdb -D data
          pg_ctl -D data -l logfile start
          psql -d postgres -c "SELECT version();"
          psql -d postgres -c "SELECT current_setting('server_version_num');"
          popd
 
      - name: Script
        run: |
          set -x -v -e
          export USE_PGXS=1
          export PATH=/usr/local/pgsql/bin:$PATH
          SHLIB_LINK=-lgcov PG_CPPFLAGS="-fprofile-arcs -ftest-coverage -O0" make
          # USE_PGXS=1 is not required in Travis, and it is required in Github Actions
          sudo USE_PGXS=1 PATH=/usr/local/pgsql/bin:$PATH make install
          make installcheck || (cat regression.diffs && false)
        env:
          USE_PGXS: 1
